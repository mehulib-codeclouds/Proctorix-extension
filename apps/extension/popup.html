<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; font-family: sans-serif; padding: 16px; margin: 0; background: #0f0f0f; color: #fff; }
    .logo { font-size: 17px; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.3px; }
    .logo span { color: #ff6b35; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; color: #aaa; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.warn { background: #f59e0b; }
    .info { font-size: 12px; color: #555; margin-bottom: 16px; word-break: break-all; }
    .btn { width: 100%; padding: 9px; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-stop { background: #dc2626; color: #fff; }
    .btn-stop:hover { background: #b91c1c; }
    .events { margin-top: 14px; }
    .events-title { font-size: 11px; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .event-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; padding: 3px 0; border-bottom: 1px solid #1f1f1f; }
    .event-row .count { color: #ff6b35; font-weight: 600; }
    .idle { font-size: 13px; color: #555; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="logo"><span>PROC</span>TORIX</div>
  <div id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
